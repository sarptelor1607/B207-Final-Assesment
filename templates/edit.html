{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-6">
        <h4 class="mb-4">Edit Entry</h4>
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="POST" action="{{ url_for('edit', entry_id=entry.id) }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">Site Name</label>
                        <input type="text" name="site_name" class="form-control" value="{{ entry.site_name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Site URL</label>
                        <input type="url" name="site_url" class="form-control" value="{{ entry.site_url or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Username / Email</label>
                        <input type="text" name="username" class="form-control" value="{{ entry.username or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <input type="text" name="password" id="passwordField" class="form-control font-monospace" value="{{ current_password }}">
                            <button type="button" class="btn btn-outline-secondary" onclick="generatePassword()">Generate</button>
                        </div>
                        <div class="form-text">Leave blank to keep the current password.</div>
                        <div class="mt-2 d-flex align-items-center gap-2">
                            <label class="form-label mb-0">Length:</label>
                            <input type="number" id="pwdLength" value="16" min="8" max="64" class="form-control form-control-sm" style="width: 70px;">
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Update</button>
                        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
function generatePassword() {
    var length = document.getElementById('pwdLength').value;
    fetch('/generate?length=' + length)
        .then(function(res) { return res.json(); })
        .then(function(data) {
            document.getElementById('passwordField').value = data.password;
        });
}
</script>
{% endblock %}
